name: Release

# Publishes gh-aegis to npm when a version tag (e.g. v0.3.1) is pushed.
#
# REQUIRED SETUP (one-time, by a maintainer):
#   1. Create an npm "Automation" access token with publish rights for gh-aegis.
#      (npmjs.com → Access Tokens → Generate New Token → Automation)
#   2. Add it as a repository secret named NPM_TOKEN:
#      GitHub → Settings → Secrets and variables → Actions → New repository secret.
#
# To cut a release: bump "version" in package.json, commit, then
#   git tag vX.Y.Z && git push origin vX.Y.Z
# This workflow then builds, tests, and runs `npm publish`.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance (--provenance)

jobs:
  publish:
    name: Build, test & publish to npm
    runs-on: ubuntu-latest
    env:
      # Job-level env (readable in step `if:`) so we can skip — not fail — when
      # the maintainer hasn't added the NPM_TOKEN secret yet.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: NPM_TOKEN not configured — skipping publish
        if: ${{ env.NPM_TOKEN == '' }}
        run: |
          echo "::warning title=Publish skipped::NPM_TOKEN secret is not set — built and tested, but did not publish."
          echo "Add an npm automation token as the NPM_TOKEN repo secret (Settings → Secrets and variables → Actions), then re-run this workflow."
