name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: typecheck · lint · test · build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # vitest 4 requires Node >= 20; the published package itself runs on Node >= 18.
        node: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
